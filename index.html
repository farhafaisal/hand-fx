<!DOCTYPE html>
<html>
<head>
  <title>Hand FX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; font-family: monospace; }
    video, canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    video  { transform: scaleX(-1); }
    canvas { transform: scaleX(-1); }

    #splash {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transition: opacity 1s ease;
    }

    #splash h1 {
      font-size: 48px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #e91e63, #7c4dff, #00bcd4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #splash p {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    #splash .creator {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      position: absolute;
      bottom: 32px;
    }

    #startBtn {
      margin-top: 16px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 12px;
      padding: 14px 40px;
      cursor: pointer;
      letter-spacing: 0.3em;
      font-family: monospace;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    #startBtn:hover {
      border-color: #7c4dff;
      color: #7c4dff;
      box-shadow: 0 0 20px rgba(124,77,255,0.3);
    }

    #watermark {
      position: fixed;
      bottom: 16px;
      right: 20px;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.15);
      z-index: 10;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div id="splash">
    <h1>Hand FX</h1>
    <p>Aura · Aurora · Hand Tracking</p>
    <button id="startBtn">Start Experience</button>
    <div class="creator">Created by Farha Faisal</div>
  </div>

  <div id="watermark">Hand FX · Farha Faisal</div>

  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const splash = document.getElementById('splash');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let time = 0;
    const wisps = [];
    const prevPalm = [null, null];
    const speed = [0, 0];
    const sprinkles = [];

    const LINE_COLORS = ['#e91e63','#00bcd4','#7c4dff','#ff6d00'];
    const CIRCLE_COLORS = [
      '#f50057','#00e5ff','#d500f9','#ff6d00',
      '#76ff03','#ff1744','#00b0ff','#c6ff00',
      '#ff9100','#ea80fc'
    ];
    const TIPS  = [4, 8, 12, 16, 20];
    const MIDS  = [3, 6, 10, 14, 18];
    const PAIRS = [
      [4,4],[4,8],[4,12],[4,16],[4,20],
      [8,4],[8,8],[8,12],[8,16],[8,20],
      [12,4],[12,8],[12,12],[12,16],[12,20],
      [16,4],[16,8],[16,12],[16,16],[16,20],
      [20,4],[20,8],[20,12],[20,16],[20,20],
      [0,0],[5,17],[9,13],[2,6],[3,7]
    ];

    function getAuraColors(spd) {
      if (spd > 25) return { inner:'rgba(255,80,0,',   mid:'rgba(255,200,50,', outer:'rgba(255,50,50,',  wisp:'#ff6600' };
      if (spd > 10) return { inner:'rgba(0,220,200,',  mid:'rgba(50,100,255,', outer:'rgba(0,180,255,',  wisp:'#00e5ff' };
      return               { inner:'rgba(180,0,255,',  mid:'rgba(100,0,255,',  outer:'rgba(60,0,180,',   wisp:'#d500f9' };
    }

    function drawAura(cx, cy, spd, breath) {
      const colors = getAuraColors(spd);
      const base = 80 + breath * 15;
      for (let i = 4; i >= 1; i--) {
        const r = base + i * 22;
        const alpha = 0.04 + i * 0.02;
        const grad = ctx.createRadialGradient(cx, cy, r*0.3, cx, cy, r);
        grad.addColorStop(0, colors.mid + (alpha+0.1) + ')');
        grad.addColorStop(0.5, colors.outer + alpha + ')');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();
      }
      const innerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, base);
      innerGrad.addColorStop(0, colors.inner + '0.5)');
      innerGrad.addColorStop(0.4, colors.mid + '0.2)');
      innerGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, base, 0, Math.PI*2);
      ctx.fillStyle = innerGrad;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, cy, base+10, 0, Math.PI*2);
      ctx.strokeStyle = colors.inner + '0.4)';
      ctx.lineWidth = 2;
      ctx.shadowColor = colors.wisp;
      ctx.shadowBlur = 20;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(cx, cy, base+35, 0, Math.PI*2);
      ctx.strokeStyle = colors.mid + '0.2)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawFingertipFlames(landmarks, spd) {
      const colors = getAuraColors(spd);
      TIPS.forEach(tip => {
        const x = landmarks[tip].x * canvas.width;
        const y = landmarks[tip].y * canvas.height;
        for (let i = 0; i < 5; i++) {
          const angle = -Math.PI/2 + (Math.random()-0.5)*1.2;
          const len = 10 + Math.random()*20;
          const grad = ctx.createLinearGradient(x, y, x+Math.cos(angle)*len, y+Math.sin(angle)*len);
          grad.addColorStop(0, colors.inner+'0.9)');
          grad.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x+Math.cos(angle)*len, y+Math.sin(angle)*len);
          ctx.strokeStyle = grad;
          ctx.lineWidth = 1.5;
          ctx.shadowColor = colors.wisp;
          ctx.shadowBlur = 10;
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI*2);
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = colors.wisp;
        ctx.shadowBlur = 15;
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    function spawnWisps(cx, cy, color) {
      if (Math.random() < 0.3) {
        wisps.push({ x:cx+(Math.random()-0.5)*60, y:cy+(Math.random()-0.5)*60,
          vx:(Math.random()-0.5)*1.5, vy:-Math.random()*2-0.5,
          life:1, size:Math.random()*3+1, color });
      }
    }

    function updateWisps() {
      for (let i = wisps.length-1; i >= 0; i--) {
        const w = wisps[i];
        w.x += w.vx; w.y += w.vy; w.life -= 0.02; w.size *= 0.98;
        if (w.life <= 0) { wisps.splice(i,1); continue; }
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.size, 0, Math.PI*2);
        ctx.fillStyle = w.color;
        ctx.globalAlpha = w.life*0.7;
        ctx.shadowColor = w.color;
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }
    }

    function drawAuroraWaves(cx, cy, spd, handIndex) {
      const waveColors = handIndex === 0
        ? ['rgba(0,255,200,','rgba(0,150,255,','rgba(100,0,255,']
        : ['rgba(255,0,150,','rgba(255,100,0,','rgba(200,0,255,'];
      for (let w = 0; w < 5; w++) {
        ctx.beginPath();
        const waveWidth = 200 + w*40;
        const waveHeight = 30 + w*12 + Math.sin(time*2+w)*10;
        const alpha = 0.15 - w*0.02;
        const yOff = Math.sin(time*1.5+w*0.8)*20;
        for (let x = -waveWidth; x <= waveWidth; x += 4) {
          const prog = x/waveWidth;
          const y = cy + yOff + Math.sin(prog*Math.PI*3+time*2+w)*waveHeight*(1-Math.abs(prog));
          x === -waveWidth ? ctx.moveTo(cx+x, y) : ctx.lineTo(cx+x, y);
        }
        const color = waveColors[w % waveColors.length];
        ctx.strokeStyle = color+alpha+')';
        ctx.lineWidth = 3-w*0.3;
        ctx.shadowColor = color+'0.8)';
        ctx.shadowBlur = 15;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      for (let r = 0; r < 3; r++) {
        ctx.beginPath();
        const ribbonW = 150+r*30;
        for (let x = -ribbonW; x <= ribbonW; x += 4) {
          const prog = x/ribbonW;
          const y = cy-60-r*25+Math.sin(prog*Math.PI*2+time*3+r*1.2)*(20+r*8)*(1-Math.abs(prog));
          x === -ribbonW ? ctx.moveTo(cx+x, y) : ctx.lineTo(cx+x, y);
        }
        const color = waveColors[r];
        ctx.strokeStyle = color+(0.25-r*0.05)+')';
        ctx.lineWidth = 2;
        ctx.shadowColor = color+'0.6)';
        ctx.shadowBlur = 12;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    function fingerOpenness(landmarks, tipIdx, midIdx) {
      const extended = landmarks[0].y - landmarks[tipIdx].y;
      const total    = landmarks[0].y - landmarks[midIdx].y;
      return Math.min(Math.max(extended/(total+0.001), 0), 1);
    }

    function isIndexPointing(landmarks) {
      return landmarks[8].y  < landmarks[6].y &&
             landmarks[12].y > landmarks[10].y &&
             landmarks[16].y > landmarks[14].y &&
             landmarks[20].y > landmarks[18].y;
    }

    function spawnTouchSprinkles(x, y) {
      for (let i = 0; i < 8; i++) {
        const angle = (i/8)*Math.PI*2;
        sprinkles.push({ x, y, vx:Math.cos(angle)*2.5, vy:Math.sin(angle)*2.5,
          life:1, color:CIRCLE_COLORS[Math.floor(Math.random()*CIRCLE_COLORS.length)], size:2 });
      }
    }

    function updateSprinkles() {
      for (let i = sprinkles.length-1; i >= 0; i--) {
        const s = sprinkles[i];
        s.x += s.vx; s.y += s.vy; s.life -= 0.05;
        if (s.life <= 0) { sprinkles.splice(i,1); continue; }
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
        ctx.fillStyle = s.color;
        ctx.globalAlpha = s.life;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function getPalmCenter(landmarks) {
      return {
        x: (landmarks[0].x+landmarks[9].x)/2*canvas.width,
        y: (landmarks[0].y+landmarks[9].y)/2*canvas.height
      };
    }

    function startMusic() {
      const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      function playNote(freq, t, dur, vol=0.05) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
        osc.start(t); osc.stop(t+dur);
      }
      const notes = [174,196,220,246,261,293,329,349];
      function loop(t) {
        notes.forEach((n,i) => {
          playNote(n, t+i*0.7, 1.8);
          playNote(n*1.5, t+i*0.7+0.35, 0.9, 0.025);
        });
        setTimeout(() => loop(audioCtx.currentTime+0.1), notes.length*700-100);
      }
      loop(audioCtx.currentTime);
    }

    startBtn.addEventListener('click', () => {
      splash.style.opacity = '0';
      setTimeout(() => splash.style.display = 'none', 1000);
      startMusic();
    });

    const hands = new Hands({locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});

    hands.setOptions({
      maxNumHands:2, modelComplexity:1,
      minDetectionConfidence:0.7, minTrackingConfidence:0.5
    });

    hands.onResults(results => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      time += 0.02;
      const breath = Math.sin(time*1.5)*0.5+0.5;

      updateWisps();
      updateSprinkles();

      if (!results.multiHandLandmarks) return;
      const allHands = results.multiHandLandmarks;

      allHands.forEach((landmarks, hi) => {
        const palm = getPalmCenter(landmarks);
        if (prevPalm[hi]) {
          speed[hi] = Math.hypot(palm.x-prevPalm[hi].x, palm.y-prevPalm[hi].y);
        }
        prevPalm[hi] = palm;
        const spd = speed[hi];
        const colors = getAuraColors(spd);

        drawAuroraWaves(palm.x, palm.y, spd, hi);
        drawAura(palm.x, palm.y, spd, breath);
        drawConnectors(ctx, landmarks, HAND_CONNECTIONS,
          {color:'rgba(255,255,255,0.08)', lineWidth:1});
        drawFingertipFlames(landmarks, spd);
        spawnWisps(palm.x, palm.y, colors.wisp);

        TIPS.forEach((tipIdx, fi) => {
          const openness = fingerOpenness(landmarks, tipIdx, MIDS[fi]);
          if (openness < 0.2) return;
          const tx = landmarks[tipIdx].x*canvas.width;
          const ty = landmarks[tipIdx].y*canvas.height;
          const wx = landmarks[0].x*canvas.width;
          const wy = landmarks[0].y*canvas.height;
          const color = LINE_COLORS[fi%LINE_COLORS.length];
          const grad = ctx.createLinearGradient(wx, wy, tx, ty);
          grad.addColorStop(0, color+'00');
          grad.addColorStop(1, color);
          ctx.beginPath();
          ctx.moveTo(wx, wy); ctx.lineTo(tx, ty);
          ctx.strokeStyle = grad;
          ctx.lineWidth = 2;
          ctx.globalAlpha = openness;
          ctx.shadowColor = color; ctx.shadowBlur = 10;
          ctx.stroke();
          ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        });

        if (isIndexPointing(landmarks)) {
          const tx = landmarks[8].x*canvas.width;
          const ty = landmarks[8].y*canvas.height;
          for (let i = 0; i < 10; i++) {
            ctx.beginPath();
            ctx.arc(tx, ty, 8+i*9, 0, Math.PI*2);
            ctx.strokeStyle = CIRCLE_COLORS[i];
            ctx.lineWidth = 1.5;
            ctx.globalAlpha = 1-i*0.07;
            ctx.shadowColor = CIRCLE_COLORS[i];
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;
          }
        }
      });

      if (allHands.length === 2) {
        const h1 = allHands[0], h2 = allHands[1];
        PAIRS.forEach((pair, index) => {
          const a = h1[pair[0]], b = h2[pair[1]];
          const ax = a.x*canvas.width, ay = a.y*canvas.height;
          const bx = b.x*canvas.width, by = b.y*canvas.height;
          const color = LINE_COLORS[index%LINE_COLORS.length];
          const grad = ctx.createLinearGradient(ax, ay, bx, by);
          grad.addColorStop(0, color);
          grad.addColorStop(1, color+'44');
          ctx.beginPath();
          ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
          ctx.strokeStyle = grad;
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.7;
          ctx.shadowColor = color; ctx.shadowBlur = 8;
          ctx.stroke();
          ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        });

        TIPS.forEach(ti => {
          const d = Math.hypot(
            (h1[ti].x-h2[ti].x)*canvas.width,
            (h1[ti].y-h2[ti].y)*canvas.height
          );
          if (d < 40 && Math.random() < 0.4) {
            spawnTouchSprinkles(
              ((h1[ti].x+h2[ti].x)/2)*canvas.width,
              ((h1[ti].y+h2[ti].y)/2)*canvas.height
            );
          }
        });
      }
    });

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({image: video}); },
      width: 1280, height: 720
    });
    camera.start();
  </script>
</body>
</html>
